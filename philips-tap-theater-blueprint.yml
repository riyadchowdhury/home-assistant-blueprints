blueprint:
  name: Zigbee2MQTT - Philips Hue Tap Dial Switch with Volume Control
  author: SmartHomeGeeks.io + Ronaldo Pace
  description:
    Integrate Philips Hue Tap Dial Switch into Home Assistant to create
    a powerful remote control, supporting single tap, double tap, hold, and conditional
    rotate functionality. When no button has been pressed first, dial rotation controls
    the volume of a media player.
  domain: automation
  input:
    mqtt_topic:
      name: MQTT Topic
      description: Topic of the Philips Hue Tap Dial Switch
      default: zigbee2mqtt/<device name>
    tap_counter:
      name: Counter Helper
      description:
        Create a counter helper within Home Assistant to monitor the number
        of button presses on the switch, distinguishing between single and multiple
        clicks.
      selector:
        entity:
          domain:
            - counter
          multiple: false
    last_pressed:
      name: Last Pressed Input Text Helper
      description:
        Create an input text helper within Home Assistant to keep track
        of the last button pressed. Each switch requires a unique helper!
      selector:
        entity:
          domain:
            - input_text
          multiple: false
    target_media_player:
      name: Media Player Entity
      description:
        The media player to control the volume when no button has been
        pressed first. Volume control only activates while the player is in
        'playing' state.
      selector:
        entity:
          domain: media_player
          multiple: false
    button_1_single_press:
      name: Button 1 Single Press
      default: []
      selector:
        action: {}
    button_1_double_press:
      name: Button 1 Double Press
      default: []
      selector:
        action: {}
    button_1_hold:
      name: Button 1 Hold
      default: []
      selector:
        action: {}
    button_1_rotate_clockwise:
      name: Button 1 Rotate Clockwise
      default: []
      selector:
        action: {}
    button_1_rotate_counter_clockwise:
      name: Button 1 Rotate Counter-Clockwise
      default: []
      selector:
        action: {}
    button_2_single_press:
      name: Button 2 Single Press
      default: []
      selector:
        action: {}
    button_2_double_press:
      name: Button 2 Double Press
      default: []
      selector:
        action: {}
    button_2_hold:
      name: Button 2 Hold
      default: []
      selector:
        action: {}
    button_2_rotate_clockwise:
      name: Button 2 Rotate Clockwise
      default: []
      selector:
        action: {}
    button_2_rotate_counter_clockwise:
      name: Button 2 Rotate Counter-Clockwise
      default: []
      selector:
        action: {}
    button_3_single_press:
      name: Button 3 Single Press
      default: []
      selector:
        action: {}
    button_3_double_press:
      name: Button 3 Double Press
      default: []
      selector:
        action: {}
    button_3_hold:
      name: Button 3 Hold
      default: []
      selector:
        action: {}
    button_3_rotate_clockwise:
      name: Button 3 Rotate Clockwise
      default: []
      selector:
        action: {}
    button_3_rotate_counter_clockwise:
      name: Button 3 Rotate Counter-Clockwise
      default: []
      selector:
        action: {}
    button_4_single_press:
      name: Button 4 Single Press
      default: []
      selector:
        action: {}
    button_4_double_press:
      name: Button 4 Double Press
      default: []
      selector:
        action: {}
    button_4_hold:
      name: Button 4 Hold
      default: []
      selector:
        action: {}
    button_4_rotate_clockwise:
      name: Button 4 Rotate Clockwise
      default: []
      selector:
        action: {}
    button_4_rotate_counter_clockwise:
      name: Button 4 Rotate Counter-Clockwise
      default: []
      selector:
        action: {}

mode: parallel
max: 50
max_exceeded: silent

trigger:
  - platform: mqtt
    topic: !input mqtt_topic

condition:
  - condition: template
    value_template: "{{ trigger.payload_json.action != '' }}"

action:
  - variables:
      input_text_var: !input last_pressed
      counter_var: !input tap_counter
      action_step: "{{ trigger.payload_json.action_step_size | int(0) }}"
      player_id: !input target_media_player
      volume: "{{ state_attr(player_id, 'volume_level') }}"
      step: "{{ trigger.payload_json.action_step_size / 423.0 }}"

  - choose:
      # -------------------------------------------------------
      # Handle button PRESS (for double-tap detection tracking)
      # -------------------------------------------------------
      - conditions:
          - condition: template
            value_template: "{{ trigger.payload_json.action is match('^button_[1-4]_press$') }}"
        sequence:
          - if:
              - condition: template
                value_template:
                  "{{ trigger.payload_json.action | regex_replace(find='[^1-4]',
                  replace='') != states(input_text_var) }}"
            then:
              - service: counter.reset
                target:
                  entity_id: "{{ counter_var }}"
          - service: input_text.set_value
            data:
              value:
                "{{ trigger.payload_json.action | regex_replace(find='[^1-4]', replace='')
                }}"
            target:
              entity_id: "{{ input_text_var }}"
          - service: counter.increment
            target:
              entity_id: "{{ counter_var }}"
          - delay:
              seconds: 1
          - service: counter.reset
            target:
              entity_id: "{{ counter_var }}"

      # -------------------------------------------------------
      # Handle DOUBLE PRESS
      # -------------------------------------------------------
      - conditions:
          - condition: template
            value_template:
              "{{ trigger.payload_json.action is match('button_[1-4]_press_release')
              and states(counter_var) > '1' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.payload_json.action == 'button_1_press_release' }}"
                sequence: !input button_1_double_press
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.payload_json.action == 'button_2_press_release' }}"
                sequence: !input button_2_double_press
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.payload_json.action == 'button_3_press_release' }}"
                sequence: !input button_3_double_press
              - conditions:
                  - condition: template
                    value_template: "{{ trigger.payload_json.action == 'button_4_press_release' }}"
                sequence: !input button_4_double_press

    default:
      # Wait briefly to rule out double tap on press_release actions
      - if:
          - condition: template
            value_template: "{{ trigger.payload_json.action is match('button_[1-4]_press_release') }}"
        then:
          - delay:
              milliseconds: 250
          - if:
              - condition: template
                value_template: "{{ states(counter_var) > '1' }}"
            then:
              - stop: Double tap detected

      - choose:
          # -------------------------------------------------------
          # Button 1 held last: rotate controls button_1 actions
          # -------------------------------------------------------
          - conditions:
              - condition: template
                value_template:
                  "{{ states(input_text_var) == '1' and trigger.payload_json.action
                  is match('^brightness_step_') }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.payload_json.action is match('^brightness_step_down') }}"
                    sequence: !input button_1_rotate_counter_clockwise
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.payload_json.action is match('^brightness_step_up') }}"
                    sequence: !input button_1_rotate_clockwise

          # -------------------------------------------------------
          # Button 2 held last: rotate controls button_2 actions
          # -------------------------------------------------------
          - conditions:
              - condition: template
                value_template:
                  "{{ states(input_text_var) == '2' and trigger.payload_json.action
                  is match('^brightness_step_') }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.payload_json.action is match('^brightness_step_down') }}"
                    sequence: !input button_2_rotate_counter_clockwise
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.payload_json.action is match('^brightness_step_up') }}"
                    sequence: !input button_2_rotate_clockwise

          # -------------------------------------------------------
          # Button 3 held last: rotate controls button_3 actions
          # -------------------------------------------------------
          - conditions:
              - condition: template
                value_template:
                  "{{ states(input_text_var) == '3' and trigger.payload_json.action
                  is match('^brightness_step_') }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.payload_json.action is match('^brightness_step_down') }}"
                    sequence: !input button_3_rotate_counter_clockwise
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.payload_json.action is match('^brightness_step_up') }}"
                    sequence: !input button_3_rotate_clockwise

          # -------------------------------------------------------
          # Button 4 held last: rotate controls button_4 actions
          # -------------------------------------------------------
          - conditions:
              - condition: template
                value_template:
                  "{{ states(input_text_var) == '4' and trigger.payload_json.action
                  is match('^brightness_step_') }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.payload_json.action is match('^brightness_step_down') }}"
                    sequence: !input button_4_rotate_counter_clockwise
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.payload_json.action is match('^brightness_step_up') }}"
                    sequence: !input button_4_rotate_clockwise

          # -------------------------------------------------------
          # No button held last: rotate controls media player volume
          # -------------------------------------------------------
          - conditions:
              - condition: template
                value_template:
                  "{{ states(input_text_var) == '' and trigger.payload_json.action
                  is match('^brightness_step_') and
                  is_state(player_id, 'on') }}"
            sequence:
              - choose:
                  - alias: Volume Up
                    conditions:
                      - condition: template
                        value_template: "{{ trigger.payload_json.action is match('^brightness_step_up') }}"
                    sequence:
                      - action: media_player.volume_set
                        data:
                          volume_level: "{{ [(volume + step), 1.0]|min }}"
                        target:
                          entity_id: !input target_media_player
                  - alias: Volume Down
                    conditions:
                      - condition: template
                        value_template: "{{ trigger.payload_json.action is match('^brightness_step_down') }}"
                    sequence:
                      - action: media_player.volume_set
                        data:
                          volume_level: "{{ [(volume - step), 0.0]|max }}"
                        target:
                          entity_id: !input target_media_player

          # -------------------------------------------------------
          # Single press and hold actions
          # -------------------------------------------------------
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload_json.action == 'button_1_press_release' }}"
            sequence: !input button_1_single_press
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload_json.action == 'button_1_hold' }}"
            sequence: !input button_1_hold
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload_json.action == 'button_2_press_release' }}"
            sequence: !input button_2_single_press
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload_json.action == 'button_2_hold' }}"
            sequence: !input button_2_hold
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload_json.action == 'button_3_press_release' }}"
            sequence: !input button_3_single_press
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload_json.action == 'button_3_hold' }}"
            sequence: !input button_3_hold
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload_json.action == 'button_4_press_release' }}"
            sequence: !input button_4_single_press
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload_json.action == 'button_4_hold' }}"
            sequence: !input button_4_hold
